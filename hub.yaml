packages:
  nushell:
    repo: nushell/nushell
    uri: download/{version}/nu-{version}-{arch}-unknown-linux-musl.tar.gz
    version:
      - trim
    unpack:
      - strip 1
      - filter nu nu_plugin_*
      - wrap bin
    hooks:
      prepare: |
        let ctx = $env.HUBHOOK | from nuon
        let plugin = $ctx.options?.plugins?
        | default []
        | each {|x| $"nu_plugin_($x)" }
        cd bin
        ls nu_plugin_*
        | get name
        | where $it not-in $plugin
        | each {|x| rm -f $x }
      post: |
        let ctx = $env.HUBHOOK | from nuon
        mut cmd = [
            'mkdir ~/.config'
            'cd ~/.config'
            'mkdir nushell'
        ]
        [
            ''
            '$env.NU_POWER_CONFIG.theme.color.normal = "xterm_olive"'
            '$env.config.show_banner = "short"'
            '$env.config.use_kitty_protocol = true'
            '$env.config.filesize.unit = "metric"'
            '$env.config.datetime_format.normal = "%m/%d/%y %H:%M:%S"'
            '$env.config.datetime_format.table = "%m/%d/%y %H:%M:%S"'
            'if not ($nu.data-dir | path exists) { mkdir $nu.data-dir }'
            '$env.config.history.path = $nu.data-dir'
            '$env.config.history.file_format = "sqlite"'
            '$env.config.history.isolation = true'
            '$env.config.history.ignore_space_prefixed = true'
            '$env.config.completions.algorithm = "fuzzy" # prefix|substring|fuzzy'
            '$env.config.completions.partial = false'
            '$env.config.table.header_on_separator = true'
            '$env.config.table.mode = "frameless" # light|compact|frameless'
        ]
        | str join (char newline)
        | save -a ($ctx.mount| path join tmp config.nu)
        $cmd ++= [
            'cat /tmp/config.nu | save -a nushell/config.nu'
            'rm /tmp/config.nu'
        ]
        b exec $cmd
    options:
      config:
        git: https://github.com/fj0r/nushell.git
        clone:
          depth: 3
      plugins:
        - query
  helix:
    type: ImageVolume
    uri: ghcr.io/fj0r/assets:helix
    path: "" # opt/helix
    unpack: []
    hooks:
      prepare: |
        tree -L 2
      post: |
        let ctx = $env.HUBHOOK | from nuon
        mut cmd = [
            'mkdir ~/.config'
            'cd ~/.config'
            'rm -rf helix'
            $'cp -r /($ctx.target)/etc/helix .'
        ]
        if ($ctx.options?.config? | is-not-empty) {
            $ctx.options.config | save -f ($ctx.mount | path join tmp config.toml)
            $cmd ++= [
                'rm -f helix/config.toml'
                'mv /tmp/config.toml helix/config.toml'
            ]
            $cmd ++= [
                'mkdir ~/.local/share'
                'cd ~/.local/share'
                $'cp -r /($ctx.target)/share/steel .'
            ]
        }
        b exec $cmd
    options:
      config: |
        theme = "gruvbox"

        [editor]
        line-number = "relative"
        middle-click-paste = true
        mouse = true
        enable-steel = true
        trim-trailing-whitespace = true
        trim-final-newlines	= true
        popup-border = "none"
        commandline = false

        [editor.auto-save]
        focus-lost = true
        idle = true

        [editor.cursor-shape]
        insert = "bar"
        select = "underline"

        [editor.soft-wrap]
        enable = true

        [keys.insert]
        "A-;" = "normal_mode"

        [keys.normal]
        "A-j" = "page_cursor_half_down"
        "A-k" = "page_cursor_half_up"

        "A-s" = "save_selection"
        "C-s" = "split_selection_on_newline"

        "A-h" = "jump_backward"
        "A-l" = "jump_forward"

        [keys.normal.space]
        space = "goto_word"
        o = [
          ':sh rm -f /tmp/unique-file',
          ':insert-output yazi %{buffer_name} --chooser-file=/tmp/unique-file',
          ':insert-output echo "\x1b[?1049h\x1b[?2004h" > /dev/tty',
          ':open %sh{cat /tmp/unique-file}',
          ':redraw',
        ]

        [keys.select]
        space = { space = "goto_word" }
        "A-;" = "normal_mode"
        "A-'" = "flip_selections"
        "A-j" = "page_cursor_half_down"
        "A-k" = "page_cursor_half_up"
  wasmtime:
    repo: bytecodealliance/wasmtime
    uri: download/{version}/wasmtime-{version}-{arch}-linux.tar.xz
    unpack:
      - strip 1
      - filter wasmtime wasmtime-min
      - wrap bin
  sccache:
    repo: mozilla/sccache
    execlude_vessel: true
    uri: download/{version}/sccache-{version}-{arch}-unknown-linux-musl.tar.gz
    unpack:
      - strip 1
      - filter sccache
      - wrap bin
  mold:
    repo: rui314/mold
    exclude_vessel: true
    uri: download/v{version}/mold-{version}-{arch}-linux.tar.gz
    version:
      - substr 1
    unpack:
      - strip 1
  zellij:
    repo: zellij-org/zellij
    uri: download/{version}/zellij-{arch}-unknown-linux-musl.tar.gz
    unpack:
      - wrap bin
    hooks:
      post: |
        let ctx = $env.HUBHOOK | from nuon
        mut cmd = [
            'mkdir ~/.config'
            'cd ~/.config'
            'mkdir zellij/layouts'
        ]
        if ($ctx.options?.'config.kdl'? | is-not-empty) {
            $ctx.options.'config.kdl' | save -f ($ctx.mount | path join tmp config.kdl)
            $cmd ++= [
                'rm -f zellij/config.kdl'
                'mv /tmp/config.kdl zellij/config.kdl'
            ]
        }
        if ($ctx.options?.'top-compact.kdl'? | is-not-empty) {
            $ctx.options.'top-compact.kdl' | save -f ($ctx.mount | path join tmp top-compact.kdl)
            $cmd ++= [
                'mv /tmp/top-compact.kdl zellij/layouts'
            ]
        }
        b exec $cmd
    options:
      top-compact.kdl: |
        layout {
            pane size=1 borderless=true {
                plugin location="compact-bar"
            }
            pane
        }
      config.kdl: |
        keybinds {
            unbind "Ctrl g" "Ctrl p" "Ctrl n" "Ctrl t" "Ctrl s" "Ctrl q"

            normal clear-defaults=true {
                bind "Ctrl Alt i"     { SwitchToMode "Tab"; }
                bind "Ctrl Alt o"     { EditScrollback; }
                bind "Ctrl Alt p"     { SwitchToMode "Pane"; }
                bind "Ctrl Alt m"     { SwitchToMode "Move"; }
                bind "Ctrl Alt s"     { SwitchToMode "EnterSearch"; }
                bind "Ctrl Alt w"     { SwitchToMode "renametab"; TabNameInput 0; }
                bind "Ctrl Alt n"     { NewPane; }
                bind "Ctrl Alt /"     { NextSwapLayout; }
                bind "Ctrl Alt Space" { ToggleFloatingPanes; }
                bind "Ctrl Alt x"     { CloseFocus; }
                bind "Ctrl Alt ,"     { PageScrollUp; }
                bind "Ctrl Alt ."     { PageScrollDown; }
                bind "Ctrl Alt h"     { MoveFocusOrTab "Left"; }
                bind "Ctrl Alt l"     { MoveFocusOrTab "Right"; }
                bind "Ctrl Alt j"     { MoveFocus "Down"; }
                bind "Ctrl Alt k"     { MoveFocus "Up"; }
                bind "Alt Shift h"    { MoveTab "left"; }
                bind "Alt Shift l"    { MoveTab "right"; }
            }

            shared_except "locked" {
                bind "Ctrl Alt q" { Quit; }
                bind "Ctrl Alt d" { Detach; }
            }
        }

        // default_layout "top-compact"
        default_layout "compact"

        plugins {
            compact-bar location="zellij:compact-bar"
            configuration location="zellij:configuration"
            filepicker location="zellij:strider" {
                cwd "/"
            }
            plugin-manager location="zellij:plugin-manager"
            session-manager location="zellij:session-manager"
            status-bar location="zellij:status-bar"
            strider location="zellij:strider"
            tab-bar location="zellij:tab-bar"
            welcome-screen location="zellij:session-manager" {
                welcome_screen false
            }
        }

        load_plugins {
        }

        simplified_ui true
        theme "gruvbox-dark"
        default_mode "normal"
        default_shell "nu"
        pane_frames false
        // copy_command "wl-copy"                    // wayland
        // copy_command "pbcopy"                     // osx
        // copy_clipboard "primary"
        // copy_on_select true
        scrollback_editor "hx"
