  zot:
    repo: project-zot/zot
    exclude_vessel: true
    uri: download/{version}/zot-linux-{arch2}
    unpack:
      - mv zot-linux-{arch2} zot
      - chmodx zot
      - wrap bin
  registry:
    repo: distribution/distribution
    exclude_vessel: true
    version:
      - substr 1
    uri: download/v{version}/registry_{version}_linux_{arch2}.tar.gz
    unpack:
      - filter registry
      - wrap bin
  kubectl:
    repo: https://storage.googleapis.com/kubernetes-release/release/stable.txt
    uri: https://dl.k8s.io/{version}/kubernetes-node-linux-{arch2}.tar.gz
    unpack:
      - filter kubernetes/node/bin/kubectl kubernetes/node/bin/kubeadm
      - strip 3
      - chmodx kubectl kubeadm
      - wrap bin
  helm:
    repo: helm/helm
    uri: https://get.helm.sh/helm-{version}-linux-{arch2}.tar.gz
    unpack:
      - filter linux-{arch2}/helm
      - strip 1
      - wrap bin
  duckdb:
    repo: duckdb/duckdb
    uri: download/{version}/duckdb_cli-linux-{arch2}.zip
    unpack:
      - wrap bin
    hooks:
      prepare: |
        let ctx = $env.HUBHOOK | from nuon
        let exts = $ctx.options?.extensions? | default []
        trace o -p duckdb-extensions $exts
        let exts = $exts
        | each {|x| $"INSTALL ($x)" }
        | str join '; '
        bin/duckdb -c $"SET extension_directory = '($ctx.workdir | path join share/duckdb/extensions)'; ($exts)"
      post: |
        let ctx = $env.HUBHOOK | from nuon
        let td = "/" | path join $ctx.target share/duckdb/extensions
        [
            $"SET extension_directory = '($td)';"
            'SET autoinstall_known_extensions = true;'
            'SET autoload_known_extensions = true;'
        ]
        | str join (char newline)
        | save -a ($ctx.mount | path join root/.duckdbrc)
    options:
      extensions:
        - httpfs
        # - vortex
        - delta
        - ducklake
        - iceberg
        - lance
        - postgres
        - mysql
        - sqlite
        - fts
  surrealdb:
    repo: surrealdb/surrealdb
    # list_tags: true
