settings:
  nushell:
    git: https://github.com/fj0r/nushell.git
    clone:
      depth: 3

packages:
  nushell:
    repo: nushell/nushell
    uri: download/{version}/nu-{version}-{arch}-unknown-linux-musl.tar.gz
    version:
    - trim
    unpack:
    - strip 1
    - filter nu nu_plugin_*
    - wrap bin
    hooks:
      prepare: |
        let ctx = $env.HUBHOOK | from nuon
        let plugin = $ctx.options?.plugins?
        | default []
        | each {|x| $"nu_plugin_($x)" }
        cd bin
        ls nu_plugin_*
        | get name
        | where $it not-in $plugin
        | each {|x| rm -f $x }
      post: |
        let ctx = $env.HUBHOOK | from nuon
        let cfg = $ctx.mount | path join root/.config/nushell
        mkdir $cfg
        [
            '$env.config.show_banner = "short"'
            'export alias pst = pueue status'
            'export alias pf = pueue follow'
        ]
        | str join (char newline)
        | save -a ($cfg | path join config.nu)
    options:
      plugins:
      - query
  helix:
    repo: helix-editor/helix
    uri: download/{version}/helix-{version}-{arch}-linux.tar.xz
    unpack:
    - strip 1
    - filter hx runtime
    - wrap bin
    hooks:
      post: |
        let ctx = $env.HUBHOOK | from nuon
        let cfg = $ctx.mount | path join root/.config/helix
        mkdir $cfg
        if ($ctx.options?.config? | is-not-empty) {
            $ctx.options.config | save -a ($cfg | path join config.toml)
        }
    options:
      config: |
        #theme = "gruvbox_light"
        theme = "zenburn"

        [editor]
        line-number = "relative"
        middle-click-paste = true
        mouse = true
        # enable-steel = true
        trim-trailing-whitespace = true
        trim-final-newlines	= true
        popup-border = "none"
        # commandline = false

        [editor.auto-save]
        focus-lost = true
        idle = true

        [editor.cursor-shape]
        insert = "bar"
        select = "underline"

        [editor.soft-wrap]
        enable = true

        [keys.insert]
        "A-;" = "normal_mode"

        [keys.normal]
        "A-j" = "page_cursor_half_down"
        "A-k" = "page_cursor_half_up"

        "A-s" = "save_selection"
        "C-s" = "split_selection_on_newline"

        "A-h" = "jump_backward"
        "A-l" = "jump_forward"

        [keys.normal.space]
        space = "goto_word"
        o = [
          ':sh rm -f /tmp/unique-file',
          ':insert-output yazi %{buffer_name} --chooser-file=/tmp/unique-file',
          ':insert-output echo "\x1b[?1049h\x1b[?2004h" > /dev/tty',
          ':open %sh{cat /tmp/unique-file}',
          ':redraw',
        ]

        [keys.select]
        space = { space = "goto_word" }
        "A-;" = "normal_mode"
        "A-'" = "flip_selections"
        "A-j" = "page_cursor_half_down"
        "A-k" = "page_cursor_half_up"

  jujutsu:
    repo: jj-vcs/jj
    uri: download/{version}/jj-{version}-{arch}-unknown-linux-musl.tar.gz
    unpack:
    - filter jj
    - wrap bin
    exclude_vessel: false
    hooks:
      post: |
        let ctx = $env.HUBHOOK | from nuon
        b run [
            $'jj config set --user user.name "($ctx.author)"'
            $'jj config set --user user.email "($ctx.author)@orbit"'
        ]
  pueue:
    repo: Nukesor/pueue
    uri:
    - download/{version}/pueue-{arch}-unknown-linux-musl
    - download/{version}/pueued-{arch}-unknown-linux-musl
    unpack:
    - mv pueue-{arch}-unknown-linux-musl pueue
    - mv pueued-{arch}-unknown-linux-musl pueued
    - chmodx pueue pueued
    - wrap bin
  websocat:
    repo: vi/websocat
    uri: download/{version}/websocat.{arch}-unknown-linux-musl
    unpack:
    - mv websocat.{arch}-unknown-linux-musl websocat
    - chmodx websocat
    - wrap bin
  ferron:
    repo: ferronweb/ferron
    uri: download/{version}/ferron-{version}-{arch}-unknown-linux-musl.zip
    unpack:
    - filter ferron ferron-passwd ferron-yaml2kdl ferron-precompress
    - wrap bin
  kubectl:
    repo: https://storage.googleapis.com/kubernetes-release/release/stable.txt
    uri: https://dl.k8s.io/{version}/kubernetes-node-linux-{arch2}.tar.gz
    unpack:
    - filter kubernetes/node/bin/kubectl kubernetes/node/bin/kubeadm
    - strip 3
    - chmodx kubectl kubeadm
    - wrap bin
  helm:
    repo: helm/helm
    uri: https://get.helm.sh/helm-{version}-linux-{arch2}.tar.gz
    unpack:
    - filter linux-{arch2}/helm
    - strip 1
    - wrap bin
  duckdb:
    repo: duckdb/duckdb
    uri: download/{version}/duckdb_cli-linux-{arch2}.zip
    unpack:
    - wrap bin
    hooks:
      prepare: |
        let ctx = $env.HUBHOOK | from nuon
        let exts = $ctx.options?.extensions? | default []
        trace o -p duckdb-extensions $exts
        let exts = $exts
        | each {|x| $"INSTALL ($x)" }
        | str join '; '
        bin/duckdb -c $"SET extension_directory = '($ctx.workdir | path join share/duckdb/extensions)'; ($exts)"
      post: |
        let ctx = $env.HUBHOOK | from nuon
        let td = "/" | path join $ctx.target share/duckdb/extensions
        [
            $"SET extension_directory = '($td)';"
            'SET autoinstall_known_extensions = true;'
            'SET autoload_known_extensions = true;'
        ]
        | str join (char newline)
        | save -a ($ctx.mount | path join root/.duckdbrc)
    options:
      extensions:
      - httpfs
      - delta
      - ducklake
      - iceberg
      - postgres
      - sqlite
      - fts
  surrealdb:
    repo: surrealdb/surrealdb
    with_prerelease: true
    uri: download/{version}/surreal-{version}.linux-{arch2}.tgz
    unpack:
    - wrap bin
  mihomo:
    repo: MetaCubeX/mihomo
    uri: download/{version}/mihomo-linux-{arch2}-v3-{version}.gz
    unpack:
    - mv mihomo-linux-{arch2}-v3-{version} mihomo
    - chmodx mihomo
    - wrap bin
