*:8080 {
  root "/srv"
  cgi {
  }
  rewrite "^/bin(.*)" "/ferron/bin.nu$1" {
    file true
    directory true
  }
  rewrite "^/box(.*)" "/ferron/box.nu$1" {
    file true
    directory true
  }
  rewrite "^/vessel(.*)" "/ferron/vessel.nu$1" {
    file true
    directory true
  }
  rewrite "^/(.*)" "/ferron/index.nu/$1" {
    file true
    directory true
  }
  cgi {
    extension ".nu"
  }
  observability {
    provider "file"
    access_log "/dev/stdout"
  }
  observability {
    provider "file"
    error_log "/dev/stderr"
  }
}
