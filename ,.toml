[assets.image]
repo = "ghcr.io/fj0r/xy"
tags = [
  "latest",
  "z",
  "ferron",
  "marimo",
]
archive = "~/pub/Platform/xy.tar.zst"

[github.nushell]
repo = "nushell/nushell"
uri = "https://github.com/nushell/nushell/releases/download/{version}/nu-{version}-{arch}-unknown-linux-musl.tar.gz"
cache = "~/Downloads"
version = ["trim"]
unpack = [
  "strip 1",
  "filter nu nu_plugin_query",
  "wrap bin",
]

[github.pueue]
repo = "Nukesor/pueue"
uri = [
  "https://github.com/Nukesor/pueue/releases/download/{version}/pueue-{arch}-unknown-linux-musl",
  "https://github.com/Nukesor/pueue/releases/download/{version}/pueued-{arch}-unknown-linux-musl",
]
cache = "~/Downloads"
unpack = [
  "chmod pueue pueued",
  "wrap bin",
]

[github.websocat]
repo = "vi/websocat"
uri = "https://github.com/vi/websocat/releases/download/{version}/websocat.{arch}-unknown-linux-musl"
cache = "~/Downloads"
unpack = [
    "mv websocat.{arch}-unknown-linux-musl websocat",
    "wrap bin",
]
