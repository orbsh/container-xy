name: vpn

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  workflow_run:
    workflows: [core]
    branches: [release, core]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  USERNAME: fj0r
  IMAGE_NAME: xy

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: fj0r
          password: ${{ secrets.GHCR_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '0.113.0'

      - name: build wireguard
        shell: buildah unshare nu {0}
        run: |-
          overlay use ${{ github.workspace }}/images/ext/wireguard.nu as build
          build {
            author: ${{ env.USERNAME }}
            password: ${{ secrets.GHCR_TOKEN }}
            image: ${{ env.REGISTRY }}/${{ env.USERNAME }}/${{ env.IMAGE_NAME }}
            tag: wireguard
          }

      - name: Build ladder
        shell: buildah unshare nu {0}
        run: |
          overlay use ${{ github.workspace }}/images/ext/ladder.nu as build
          build {
            author: ${{ env.USERNAME }}
            password: ${{ secrets.GHCR_TOKEN }}
            image: ${{ env.REGISTRY }}/${{ env.USERNAME }}/${{ env.IMAGE_NAME }}
            tag: ''
          }
