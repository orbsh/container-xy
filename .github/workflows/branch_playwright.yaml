name: 'branch_playwright'
'on':
  push:
    branches:
      - 'playwright'
    tags:
      - 'v*.*.*'
  workflow_dispatch: null
env:
  REGISTRY: 'ghcr.io'
  USERNAME: 'fj0r'
  IMAGE_NAME: 'xy'
jobs:
  build:
    runs-on: 'ubuntu-latest'
    if: '${{ !endsWith(github.event.head_commit.message, ''~'') }}'
    permissions:
      contents: 'read'
      packages: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v3'
        with:
          submodules: 'true'
      - name: 'Log into registry ${{ env.REGISTRY }}'
        if: 'github.event_name != ''pull_request'''
        uses: 'docker/login-action@v2'
        with:
          registry: '${{ env.REGISTRY }}'
          username: '${{ env.USERNAME }}'
          password: '${{ secrets.GHCR_TOKEN }}'
      - name: 'Extract Docker metadata'
        id: 'meta'
        uses: 'docker/metadata-action@v4'
        with:
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}'
      - name: 'Setup Nushell'
        uses: 'hustcer/setup-nu@v3'
        with:
          version: '0.113.0'
      - name: 'build playwright'
        shell: 'buildah unshare nu {0}'
        run: "overlay use ${{ github.workspace }}/images/ext/playwright.nu as build\nbuild {\n  author: ${{ env.USERNAME }}\n  password: ${{ secrets.GHCR_TOKEN }}\n  image: ${{ env.REGISTRY }}/${{ env.USERNAME }}/${{ env.IMAGE_NAME }}\n  tag: playwright\n}"
      - name: 'Delete untagged ghcr'
        uses: 'Chizkiyahu/delete-untagged-ghcr-action@v3'
        with:
          token: '${{ secrets.GHCR_TOKEN }}'
          repository: '${{ github.repository }}'
          repository_owner: '${{ github.repository_owner }}'
          package_name: ''
          untagged_only: true
          except_untagged_multiplatform: false
          owner_type: 'user'
