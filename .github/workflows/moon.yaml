name: moon
on:
  workflow_run:
    workflows: [core]
    branches: [release, core]
    types:
      - completed
  workflow_dispatch: null
env:
  REGISTRY: ghcr.io
  USERNAME: fj0r
  IMAGE_NAME: xy
jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.event.head_commit.message, '~') }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: "true"
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: 0.113.0
      - name: Setup upterm session
        uses: owenthereal/action-upterm@v1
        if: contains(github.event.head_commit.message, '+debug')
        with:
          upterm-server: ${{ secrets.UPTERMD_ADDR }}
      - name: build moon
        shell: buildah unshare nu {0}
        run: |-
          overlay use ${{ github.workspace }}/images/core/moon.nu as build
          build {
            author: ${{ env.USERNAME }}
            password: ${{ secrets.GHCR_TOKEN }}
            image: ${{ env.REGISTRY }}/${{ env.USERNAME }}/${{ env.IMAGE_NAME }}
            tag: moon
          }
      - name: Delete untagged ghcr
        uses: Chizkiyahu/delete-untagged-ghcr-action@v3
        with:
          token: ${{ secrets.GHCR_TOKEN }}
          repository: ${{ github.repository }}
          repository_owner: ${{ github.repository_owner }}
          package_name: ""
          untagged_only: true
          except_untagged_multiplatform: false
          owner_type: user
